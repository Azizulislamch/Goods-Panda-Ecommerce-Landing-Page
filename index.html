<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goods Panda</title>

    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <!-- Header -->
    <header>
        <div class="container-nav">
            <div class="logo">
                <img class="icon" src="assets/logo.png" alt="">
            </div>

            <div class="menu">
                <img class="icon" src="assets/menu-bar.png" alt="">
            </div>
        </div>
    </header>

    <!-- Main -->
    <main>
        <!-- Hero Section -->
        <section class="hero-section">
            <div class="hero-left">
                <h1>Mi LED TV 4A PRO 32</h1>
                <p>Amet minim mollit non deserunt ullamco est sit aliqua dolor do amet sint. Velit officia consequat
                    duis enim velit mollit. Exercitation veniam consequat sunt nostrud amet.</p>
                <h2 class="price">$1289</h2>
                <button class="hero-btn">BUY NOW</button>
            </div>

            <div class="hero-right">
                <img src="assets/hero-tv.png" alt="">
            </div>
        </section>

        <!-- Categories Section -->
        <section class="categories">
            <div class="title">
                <h2>Categories</h2>
            </div>

            <div class="cate-container">
                <div class="watch">
                    <h3>Watch</h3>
                    <img src="assets/category-watch.png" alt="Watch">
                </div>
                <div class="bag">
                    <h3>Bag</h3>
                    <img src="assets/category-bag.png" alt="Bag">
                </div>
                <div class="shoes">
                    <h3>Shoes</h3>
                    <img src="assets/category-shoe.png" alt="Shoe">
                </div>
            </div>
        </section>
    </main>

    <footer>

    </footer>

</body>

</html>
